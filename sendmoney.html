<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <title>Enviar Dinero</title>
</head>
<body>
  <div class="container" style="margin-top: 50px; max-width: 450px;">
    <h2>Enviar Dinero</h2>
    <div class="mb-3">
      Tu Saldo disponible: <span id="saldoEnEnvio" class="font-weight-bold">0</span>
    </div>
    <form id="formEnviar">
      <div class="form-group">
        <label>Destinatario (Nombre o Alias):</label>
        <input type="text" id="destinatario" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Monto a transferir:</label>
        <input type="number" id="montoAEnviar" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-warning">Enviar Fondos</button>
      <a href="menu.html" class="btn btn-secondary">Volver</a>
    </form>
  </div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
